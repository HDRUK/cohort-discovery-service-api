name: Run quality checks
run-name: ${{ github.actor }} triggered quality check pipeline
on:
  push:
  pull_request:

jobs:
  test:
    environment: dev
    timeout-minutes: 20
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: daphne_test
          MYSQL_USER: laravel
          MYSQL_PASSWORD: laravel
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -p${MYSQL_ROOT_PASSWORD}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup PHP with PECL extension
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, bcmath, pdo_mysql
          coverage: none

      - name: Composer install
        run: "composer install"

      - name: Run code sniffer
        run: "composer run lint"

      #   - name: Run swagger check
      #     run: php artisan l5-swagger:generate

      - name: Ensure storage directory exists
        run: mkdir -p storage

      - name: Setup Passport OAuth keys
        run: |
          printf "%s" "${{ secrets.OAUTH_PRIVATE }}" > storage/oauth-private.key
          printf "%s" "${{ secrets.OAUTH_PUBLIC }}" > storage/oauth-public.key
          chmod 600 storage/oauth-private.key storage/oauth-public.key

      - name: Create second OMOP test database
        run: |
          sudo apt-get install -y mysql-client
          mysql -h 127.0.0.1 -uroot -proot -e "CREATE DATABASE IF NOT EXISTS daphne_test;"
          mysql -h 127.0.0.1 -uroot -proot -e "CREATE DATABASE IF NOT EXISTS omop_test;"

      - name: Configure environment
        run: |
          cp .env.example .env

          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=mysql/' .env

          echo "" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=daphne_test" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=root" >> .env

          echo "" >> .env
          echo "DB_OMOP_CONNECTION=omop" >> .env
          echo "DB_OMOP_HOST=127.0.0.1" >> .env
          echo "DB_OMOP_PORT=3306" >> .env
          echo "DB_OMOP_DATABASE=omop_test" >> .env
          echo "DB_OMOP_USERNAME=root" >> .env
          echo "DB_OMOP_PASSWORD=root" >> .env

          cat .env

      - name: Debug key files
        run: |
          ls -l storage
          head -n 5 storage/oauth-private.key
          head -n 5 storage/oauth-public.key

      - name: Generate application key
        run: php artisan key:generate

      - name: Run main application migrations
        run: php artisan migrate:fresh --database=mysql
      
      - name: Run main application seeding
        run: php artisan db:seed --class=DatabaseSeeder

      - name: Run omop migrations
        run: php artisan migrate:fresh --database=omop --path='database/migrations_omop'

      - name: "Run omop seeding"
        run: php artisan db:seed --class=MinimalOmopSeeder --database=omop

      - name: Run static analysis
        run: "./vendor/bin/phpstan analyse app -vvv  --memory-limit 512M"

      - name: Run linting
        run: "composer run lint"

      - name: Run unit tests
        run: "composer run test"
