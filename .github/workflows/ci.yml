name: Run quality checks
run-name: ${{ github.actor }} triggered quality check pipeline
on:
  push:
  pull_request:

jobs:
  test:
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup PHP with PECL extension
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Composer install
        run: "composer install"

      - name: Run code sniffer
        run: "composer run lint"

      #   - name: Run swagger check
      #     run: php artisan l5-swagger:generate

      # LS - Very temporary while early days. Safe enough as Action containers
      # are ephemeral
      - name: Install Passport keys
        run: php artisan passport:install --force

      - name: Run static analysis
        run: "./vendor/bin/phpstan analyse app -vvv  --memory-limit 512M"

      - name: Run unit tests
        env:
          APP_ENV: "testing"
          DB_CONNECTION: "sqlite"
          DB_DATABASE: ":memory:"
        run: "composer run test"
